<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Геймдизайн — замечания</title>
<meta name="robots" content="noindex, nofollow"> <!-- дополнительная защита от индексации -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/tabler-icons.min.css">
<style>
:root {
  --bg:        #0e0f13;
  --bg2:       #161720;
  --bg3:       #1e2030;
  --border:    #2a2d40;
  --border2:   #363a52;
  --text:      #c8cce0;
  --text2:     #7a7f9a;
  --text3:     #494d6a;
  --accent:    #7c6fcd;
  --accent-h:  #9d92e0;

  /* category palette – muted dark versions */
  --c1: #7c6fcd; --c1bg: #1d1a2e; --c1bd: #3b355c;
  --c2: #4aad8b; --c2bg: #0f2620; --c2bd: #25503f;
  --c3: #c99848; --c3bg: #2a1f09; --c3bd: #5a3f10;
  --c4: #d07a5a; --c4bg: #2a140d; --c4bd: #5a2b1c;
  --c5: #d06060; --c5bg: #2a0f0f; --c5bd: #5a2020;
  --c6: #5a9fd4; --c6bg: #0d1e2e; --c6bd: #1e3f5a;

  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

.page {
  max-width: 780px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ── Header ─────────────────────────────── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
  gap: 12px;
  flex-wrap: wrap;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .12em;
  color: var(--text3);
  text-transform: uppercase;
}
.header-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
}
.header-right { display: flex; gap: 8px; align-items: center; }
.stat-chip {
  font-size: 11px;
  color: var(--text2);
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 10px;
  font-family: 'JetBrains Mono', monospace;
}

/* ── Tabs ────────────────────────────────── */
.tabs-row {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 20px;
  align-items: center;
}
.tab {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  font-size: 12.5px;
  font-weight: 500;
  border-radius: 20px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
  transition: border-color .12s, background .12s, color .12s;
}
.tab:hover { border-color: var(--border2); background: var(--bg2); color: var(--text); }
.tab .cnt { font-size: 10.5px; opacity: .6; }
.tab i { font-size: 14px; }

.tab.active.t1 { background: var(--c1bg); border-color: var(--c1bd); color: var(--c1); }
.tab.active.t2 { background: var(--c2bg); border-color: var(--c2bd); color: var(--c2); }
.tab.active.t3 { background: var(--c3bg); border-color: var(--c3bd); color: var(--c3); }
.tab.active.t4 { background: var(--c4bg); border-color: var(--c4bd); color: var(--c4); }
.tab.active.t5 { background: var(--c5bg); border-color: var(--c5bd); color: var(--c5); }
.tab.active.t6 { background: var(--c6bg); border-color: var(--c6bd); color: var(--c6); }

.add-section-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 13px;
  font-size: 12.5px;
  font-weight: 500;
  border-radius: 20px;
  border: 1px dashed var(--border2);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: border-color .12s, color .12s, background .12s;
}
.add-section-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,205,.08); }

/* ── Section ─────────────────────────────── */
.sec { display: none; flex-direction: column; gap: 8px; }
.sec.active { display: flex; }

.sec-head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 4px;
  gap: 12px;
}
.sec-head-left { display: flex; flex-direction: column; gap: 3px; }
.sec-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  width: fit-content;
}
.sec-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }

.t1 .sec-badge { background: var(--c1bg); color: var(--c1); border: 1px solid var(--c1bd); }
.t2 .sec-badge { background: var(--c2bg); color: var(--c2); border: 1px solid var(--c2bd); }
.t3 .sec-badge { background: var(--c3bg); color: var(--c3); border: 1px solid var(--c3bd); }
.t4 .sec-badge { background: var(--c4bg); color: var(--c4); border: 1px solid var(--c4bd); }
.t5 .sec-badge { background: var(--c5bg); color: var(--c5); border: 1px solid var(--c5bd); }
.t6 .sec-badge { background: var(--c6bg); color: var(--c6); border: 1px solid var(--c6bd); }

/* ── Cards ───────────────────────────────── */
.card {
  display: flex;
  gap: 12px;
  padding: 13px 14px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  transition: border-color .12s;
  position: relative;
}
.card:hover { border-color: var(--border2); }

.num {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10.5px;
  font-weight: 600;
  flex-shrink: 0;
  margin-top: 1px;
  font-family: 'JetBrains Mono', monospace;
}
.t1 .num { background: var(--c1bg); color: var(--c1); }
.t2 .num { background: var(--c2bg); color: var(--c2); }
.t3 .num { background: var(--c3bg); color: var(--c3); }
.t4 .num { background: var(--c4bg); color: var(--c4); }
.t5 .num { background: var(--c5bg); color: var(--c5); }
.t6 .num { background: var(--c6bg); color: var(--c6); }

.body { flex: 1; min-width: 0; }
.ttl { font-size: 13.5px; color: var(--text); line-height: 1.4; font-weight: 500; }
.sub { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.55; }
.hot {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 6px;
  margin-top: 6px;
  background: rgba(208,96,96,.18);
  color: #e08080;
  border: 1px solid rgba(208,96,96,.3);
}

/* card action buttons */
.card-actions {
  display: flex;
  gap: 4px;
  opacity: 0;
  transition: opacity .12s;
  flex-shrink: 0;
}
.card:hover .card-actions { opacity: 1; }
.card-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 26px;
  height: 26px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  transition: border-color .1s, color .1s, background .1s;
}
.card-btn:hover { border-color: var(--border2); color: var(--text); background: var(--bg2); }
.card-btn.del:hover { border-color: rgba(208,96,96,.4); color: #e08080; }

/* Add card button */
.add-card-btn {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 10px 14px;
  background: transparent;
  border: 1px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text3);
  cursor: pointer;
  font-size: 13px;
  transition: border-color .12s, color .12s, background .12s;
  width: 100%;
  margin-top: 4px;
}
.add-card-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,205,.05); }

/* Section edit bar */
.sec-actions {
  display: flex;
  gap: 5px;
  flex-shrink: 0;
  margin-top: 2px;
}
.sec-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 28px;
  height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  font-size: 15px;
  transition: border-color .1s, color .1s;
}
.sec-btn:hover { border-color: var(--border2); color: var(--text); }
.sec-btn.del:hover { border-color: rgba(208,96,96,.4); color: #e08080; }

/* ── Toolbar ─────────────────────────────── */
.toolbar {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
  margin-top: 28px;
  flex-wrap: wrap;
}
.tool-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  font-size: 12px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  transition: border-color .12s, color .12s, background .12s;
}
.tool-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(124,111,205,.08); }
.tool-btn i { font-size: 15px; }

/* ── Modal ───────────────────────────────── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.6);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 24px;
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.modal-title {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
}
.modal label {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 11.5px;
  color: var(--text2);
  font-weight: 500;
  letter-spacing: .04em;
  text-transform: uppercase;
}
.modal input,
.modal textarea,
.modal select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 13.5px;
  padding: 9px 12px;
  resize: vertical;
  outline: none;
  transition: border-color .12s;
  width: 100%;
}
.modal input:focus,
.modal textarea:focus,
.modal select:focus { border-color: var(--accent); }
.modal textarea { min-height: 80px; }

.modal-row { display: flex; gap: 8px; }
.modal-row label { flex: 1; }

.modal-icons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.icon-pick {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 34px;
  height: 34px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  cursor: pointer;
  font-size: 16px;
  transition: border-color .1s, color .1s;
}
.icon-pick.sel { border-color: var(--accent); color: var(--accent); background: rgba(124,111,205,.12); }

.modal-footer {
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}
.btn-cancel {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--text2);
  cursor: pointer;
}
.btn-ok {
  padding: 8px 20px;
  font-size: 13px;
  font-weight: 500;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: background .12s;
}
.btn-ok:hover { background: var(--accent-h); }

.checkbox-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12.5px;
  color: var(--text2);
  cursor: pointer;
}
.checkbox-row input { width: auto; }

/* ── Scrollbar ───────────────────────────── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── Password Gate ───────────────────────── */
#pw-gate {
  position: fixed; inset: 0;
  background: var(--bg);
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#pw-gate.hidden { display: none; }
.pw-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  max-width: 340px;
}
.pw-lock {
  width: 52px; height: 52px;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: var(--accent);
}
.pw-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -.01em;
  text-align: center;
}
.pw-sub {
  font-size: 12px;
  color: var(--text2);
  text-align: center;
  margin-top: -12px;
}
.pw-field {
  width: 100%;
  position: relative;
}
.pw-field input {
  width: 100%;
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 15px;
  letter-spacing: .1em;
  padding: 12px 44px 12px 16px;
  outline: none;
  transition: border-color .15s;
}
.pw-field input:focus { border-color: var(--accent); }
.pw-field input.error { border-color: #d06060; animation: shake .3s ease; }
.pw-eye {
  position: absolute; right: 12px; top: 50%;
  transform: translateY(-50%);
  background: none; border: none;
  color: var(--text3); cursor: pointer;
  font-size: 17px; padding: 0;
  display: flex; align-items: center;
  transition: color .12s;
}
.pw-eye:hover { color: var(--text2); }
.pw-submit {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: var(--radius);
  background: var(--accent);
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background .12s, opacity .12s;
}
.pw-submit:hover { background: var(--accent-h); }
.pw-submit:disabled { opacity: .5; cursor: not-allowed; }
.pw-error {
  font-size: 12px;
  color: #e08080;
  text-align: center;
  min-height: 16px;
  opacity: 0;
  transition: opacity .2s;
}
.pw-error.show { opacity: 1; }
#main-content { display: none; }
#main-content.unlocked { display: block; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  60% { transform: translateX(6px); }
  80% { transform: translateX(-3px); }
}

/* ── Toast ───────────────────────────────── */
#toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  border-radius: var(--radius-sm);
  padding: 9px 18px;
  font-size: 12.5px;
  z-index: 200;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-box">
    <div class="pw-lock"><i class="ti ti-lock"></i></div>
    <div class="pw-title">Геймдизайн — замечания</div>
    <p class="pw-sub">Введите пароль для доступа</p>
    <div class="pw-field">
      <input type="password" id="pw-input" placeholder="Пароль…" autocomplete="off" spellcheck="false">
      <button class="pw-eye" id="pw-eye-btn" tabindex="-1" title="Показать пароль">
        <i class="ti ti-eye" id="pw-eye-icon"></i>
      </button>
    </div>
    <div class="pw-error" id="pw-error">Неверный пароль</div>
    <button class="pw-submit" id="pw-submit-btn">Войти</button>
  </div>
</div>

<div id="main-content">
<div class="page">
  <div class="header">
    <div class="header-left">
      <span class="header-eyebrow">Геймдизайн</span>
      <span class="header-title">Замечания по разработке</span>
    </div>
    <div class="header-right">
      <span class="stat-chip" id="total-stat">—</span>
    </div>
  </div>
  <div class="tabs-row" id="tabs-row"></div>
  <div id="sections-container"></div>
  <div class="toolbar">
    <button class="tool-btn" id="exportBtn"><i class="ti ti-download"></i>Экспорт JSON</button>
    <button class="tool-btn" id="importBtn"><i class="ti ti-upload"></i>Импорт JSON</button>
    <input type="file" id="import-input" accept=".json" style="display:none">
  </div>
</div>

<div class="overlay" id="card-modal">
  <div class="modal">
    <div class="modal-title" id="card-modal-title">Добавить карточку</div>
    <label>Заголовок
      <input type="text" id="card-title-inp" placeholder="Название механики / бага / идеи">
    </label>
    <label>Описание
      <textarea id="card-sub-inp" placeholder="Подробности…"></textarea>
    </label>
    <label class="checkbox-row">
      <input type="checkbox" id="card-hot-inp"> Высокий приоритет
    </label>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('card-modal')">Отмена</button>
      <button class="btn-ok" onclick="saveCard()">Сохранить</button>
    </div>
  </div>
</div>

<div class="overlay" id="section-modal">
  <div class="modal">
    <div class="modal-title" id="section-modal-title">Добавить раздел</div>
    <label>Название раздела
      <input type="text" id="sec-name-inp" placeholder="Например: Механики">
    </label>
    <label>Описание
      <input type="text" id="sec-desc-inp" placeholder="Краткое описание раздела…">
    </label>
    <label>Иконка
      <div class="modal-icons" id="icon-picker"></div>
    </label>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('section-modal')">Отмена</button>
      <button class="btn-ok" onclick="saveSection()">Сохранить</button>
    </div>
  </div>
</div>

<div id="toast"></div>
</div>

<script>
// -----------------------------------------------------------------------------
// Вся оригинальная база данных (заметки) зашифрована в base64.
// Исходный текст НЕ присутствует в исходном коде страницы до ввода пароля.

let data = null;
let activeSecId = null;
let editingCardIdx = null;
let editingSecIdx = null;
let cardTargetSecIdx = null;
let selectedIcon = "ti-refresh";

// Инициализация данных: либо из localStorage, либо из расшифрованных дефолтных
async function initializeData() {
  const savedRaw = localStorage.getItem('gd-notes-v2');
  if (savedRaw) {
    try {
      data = JSON.parse(savedRaw);
      if (data && data.sections) return;
    } catch(e) {}
  }
  // расшифровка base64
  try {
    const decoded = atob(ENCRYPTED_DEFAULT_DATA);
    data = JSON.parse(decoded);
  } catch(e) {
    console.error('Decryption failed', e);
    data = { sections: [] };
  }
}

function saveToLocalStorage() {
  if (data) localStorage.setItem('gd-notes-v2', JSON.stringify(data));
}

function render() {
  if (!data) return;
  const { sections } = data;
  if (!activeSecId || !sections.find(s => s.id === activeSecId)) {
    activeSecId = sections[0]?.id ?? null;
  }

  const total = sections.reduce((a, s) => a + s.cards.length, 0);
  document.getElementById('total-stat').textContent = `${total} пунктов · ${sections.length} категорий`;

  const tabsRow = document.getElementById('tabs-row');
  tabsRow.innerHTML = '';
  sections.forEach((sec, i) => {
    const btn = document.createElement('button');
    btn.className = `tab t${(i%6)+1}${sec.id === activeSecId ? ' active' : ''}`;
    btn.innerHTML = `<i class="ti ${sec.icon}" aria-hidden="true"></i>${escapeHtml(sec.name)} <span class="cnt">${sec.cards.length}</span>`;
    btn.onclick = () => { activeSecId = sec.id; render(); };
    tabsRow.appendChild(btn);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'add-section-btn';
  addBtn.innerHTML = '<i class="ti ti-plus"></i>Раздел';
  addBtn.onclick = () => openSectionModal();
  tabsRow.appendChild(addBtn);

  const container = document.getElementById('sections-container');
  container.innerHTML = '';
  sections.forEach((sec, si) => {
    const colorIdx = (si % 6) + 1;
    const div = document.createElement('div');
    div.id = sec.id;
    div.className = `sec t${colorIdx}${sec.id === activeSecId ? ' active' : ''}`;
    div.innerHTML = `
      <div class="sec-head">
        <div class="sec-head-left">
          <span class="sec-badge"><i class="ti ${sec.icon}" style="font-size:12px" aria-hidden="true"></i>${escapeHtml(sec.name)}</span>
          <p class="sec-desc">${escapeHtml(sec.desc)}</p>
        </div>
        <div class="sec-actions">
          <button class="sec-btn" title="Редактировать раздел" onclick="openSectionModal(${si})"><i class="ti ti-pencil"></i></button>
          ${sections.length > 1 ? `<button class="sec-btn del" title="Удалить раздел" onclick="deleteSection(${si})"><i class="ti ti-trash"></i></button>` : ''}
        </div>
      </div>
    `;
    sec.cards.forEach((card, ci) => {
      const cardDiv = document.createElement('div');
      cardDiv.className = 'card';
      cardDiv.innerHTML = `
        <div class="num">${ci + 1}</div>
        <div class="body">
          <p class="ttl">${escapeHtml(card.title)}</p>
          <p class="sub">${escapeHtml(card.sub)}</p>
          ${card.hot ? '<span class="hot">Высокий приоритет</span>' : ''}
        </div>
        <div class="card-actions">
          <button class="card-btn" title="Редактировать" onclick="openCardModal(${si}, ${ci})"><i class="ti ti-pencil"></i></button>
          <button class="card-btn del" title="Удалить" onclick="deleteCard(${si}, ${ci})"><i class="ti ti-trash"></i></button>
        </div>
      `;
      div.appendChild(cardDiv);
    });
    const addCard = document.createElement('button');
    addCard.className = 'add-card-btn';
    addCard.innerHTML = `<i class="ti ti-plus"></i>Добавить карточку`;
    addCard.onclick = () => openCardModal(si, null);
    div.appendChild(addCard);
    container.appendChild(div);
  });
}

function escapeHtml(str) { return String(str || '').replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

function openCardModal(secIdx, cardIdx) {
  if (!data) return;
  cardTargetSecIdx = secIdx; editingCardIdx = cardIdx;
  document.getElementById('card-modal-title').textContent = cardIdx === null ? 'Добавить карточку' : 'Редактировать карточку';
  if (cardIdx !== null) {
    const card = data.sections[secIdx].cards[cardIdx];
    document.getElementById('card-title-inp').value = card.title;
    document.getElementById('card-sub-inp').value = card.sub;
    document.getElementById('card-hot-inp').checked = card.hot;
  } else {
    document.getElementById('card-title-inp').value = '';
    document.getElementById('card-sub-inp').value = '';
    document.getElementById('card-hot-inp').checked = false;
  }
  document.getElementById('card-modal').classList.add('open');
}

function saveCard() {
  if (!data) return;
  const title = document.getElementById('card-title-inp').value.trim();
  const sub = document.getElementById('card-sub-inp').value.trim();
  const hot = document.getElementById('card-hot-inp').checked;
  if (!title) { toast('Введите заголовок'); return; }
  const sec = data.sections[cardTargetSecIdx];
  if (editingCardIdx !== null) sec.cards[editingCardIdx] = { title, sub, hot };
  else sec.cards.push({ title, sub, hot });
  saveToLocalStorage(); render();
  closeModal('card-modal');
}

function openSectionModal(secIdx) {
  if (!data) return;
  editingSecIdx = secIdx ?? null;
  const modal = document.getElementById('section-modal');
  document.getElementById('section-modal-title').textContent = secIdx == null ? 'Добавить раздел' : 'Редактировать раздел';
  if (secIdx != null) {
    const sec = data.sections[secIdx];
    document.getElementById('sec-name-inp').value = sec.name;
    document.getElementById('sec-desc-inp').value = sec.desc;
    selectedIcon = sec.icon;
  } else {
    document.getElementById('sec-name-inp').value = '';
    document.getElementById('sec-desc-inp').value = '';
    selectedIcon = 'ti-refresh';
  }
  const picker = document.getElementById('icon-picker');
  picker.innerHTML = '';
  const icons = ['ti-refresh','ti-arrow-up','ti-scale','ti-alert-triangle','ti-bug','ti-bulb','ti-sparkles','ti-flag','ti-clock','ti-rocket','ti-tool','ti-star','ti-eye','ti-settings'];
  icons.forEach(icon => {
    const btn = document.createElement('button');
    btn.className = `icon-pick${icon === selectedIcon ? ' sel' : ''}`;
    btn.innerHTML = `<i class="ti ${icon}"></i>`;
    btn.title = icon;
    btn.onclick = () => { selectedIcon = icon; picker.querySelectorAll('.icon-pick').forEach(b => b.classList.remove('sel')); btn.classList.add('sel'); };
    picker.appendChild(btn);
  });
  modal.classList.add('open');
}

function saveSection() {
  if (!data) return;
  const name = document.getElementById('sec-name-inp').value.trim();
  const desc = document.getElementById('sec-desc-inp').value.trim();
  if (!name) { toast('Введите название раздела'); return; }
  if (editingSecIdx !== null) {
    const sec = data.sections[editingSecIdx];
    sec.name = name; sec.desc = desc; sec.icon = selectedIcon;
  } else {
    const id = 's' + Date.now();
    data.sections.push({ id, name, desc, icon: selectedIcon, cards: [] });
    activeSecId = id;
  }
  saveToLocalStorage(); render();
  closeModal('section-modal');
}

function deleteCard(secIdx, cardIdx) { if(!data) return; if (!confirm('Удалить карточку?')) return; data.sections[secIdx].cards.splice(cardIdx,1); saveToLocalStorage(); render(); }
function deleteSection(secIdx) { if(!data) return; if (!confirm(`Удалить раздел «${data.sections[secIdx].name}» и все его карточки?`)) return; data.sections.splice(secIdx,1); activeSecId = data.sections[0]?.id ?? null; saveToLocalStorage(); render(); }

function exportData() { if(!data) return; const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='gamedesign_notes.json'; a.click(); toast('JSON экспортирован'); }
function importClick() { document.getElementById('import-input').click(); }
function importData(e) { if(!data) return; const file=e.target.files[0]; if(!file) return; const reader=new FileReader(); reader.onload=ev=>{ try{ const parsed=JSON.parse(ev.target.result); if(!parsed.sections) throw new Error(); data=parsed; activeSecId=data.sections[0]?.id??null; saveToLocalStorage(); render(); toast('Данные импортированы'); } catch(e){ toast('Ошибка: неверный формат JSON'); } e.target.value=''; }; reader.readAsText(file); }

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

document.querySelectorAll('.overlay').forEach(ov=>{ ov.addEventListener('click',e=>{ if(e.target===ov) ov.classList.remove('open'); }); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(o=>o.classList.remove('open')); });
document.getElementById('exportBtn')?.addEventListener('click', exportData);
document.getElementById('importBtn')?.addEventListener('click', importClick);
document.getElementById('import-input')?.addEventListener('change', importData);

async function fullUnlockAndRender() {
  await initializeData();
  render();
}

(async function() {
  const HASH = 'de8c5bc5912e4e379d568d78ad605ca80e6861b0f697ae0a12e1636b24e2cb42';
  const SESSION_KEY = 'gd-auth-v1';
  const gate = document.getElementById('pw-gate');
  const mainDiv = document.getElementById('main-content');
  const input = document.getElementById('pw-input');
  const submitBtn = document.getElementById('pw-submit-btn');
  const errorEl = document.getElementById('pw-error');
  const eyeBtn = document.getElementById('pw-eye-btn');
  const eyeIcon = document.getElementById('pw-eye-icon');

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  async function attempt() {
    const val = input.value;
    if (!val) return;
    submitBtn.disabled = true;
    errorEl.classList.remove('show');
    input.classList.remove('error');
    const h = await sha256(val);
    if (h === HASH) {
      gate.classList.add('hidden');
      mainDiv.classList.add('unlocked');
      sessionStorage.setItem(SESSION_KEY, '1');
      await fullUnlockAndRender();
    } else {
      input.classList.add('error');
      errorEl.classList.add('show');
      input.value = '';
      input.focus();
      setTimeout(()=>input.classList.remove('error'),400);
    }
    submitBtn.disabled = false;
  }
  if (sessionStorage.getItem(SESSION_KEY) === '1') {
    gate.classList.add('hidden');
    mainDiv.classList.add('unlocked');
    await fullUnlockAndRender();
  } else {
    setTimeout(()=>input.focus(),50);
  }
  submitBtn.addEventListener('click', attempt);
  input.addEventListener('keydown', e => { if(e.key === 'Enter') attempt(); });
  eyeBtn.addEventListener('click', () => {
    const hidden = input.type === 'password';
    input.type = hidden ? 'text' : 'password';
    eyeIcon.className = hidden ? 'ti ti-eye-off' : 'ti ti-eye';
  });
})();
</script>
</body>
</html>
